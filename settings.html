<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lumina Settings</title>

<link rel="stylesheet" href="assets/css/style.css">

</head>


<body>


<div class="settings-box">


<h1>
Lumina Editor ✨
</h1>



<label>
Recipient Name
</label>

<input id="nameInput">



<label>
Birthday Wish
</label>

<textarea id="wishInput"></textarea>




<label>
Letter
</label>

<textarea id="letterInput"></textarea>




<label>
Theme
</label>

<select id="themeInput">

<option value="galaxy">
Galaxy 🌌
</option>

<option value="sakura">
Sakura 🌸
</option>

<option value="luxury">
Luxury 🤍
</option>

<option value="ocean">
Ocean 🌊
</option>

<option value="rose">
Rose 🌹
</option>

<option value="lavender">
Lavender 💜
</option>

<option value="midnight">
Midnight ⚫
</option>

</select>




<button id="save">

Save Changes 💾

</button>


<p>

Edit photos in:
<br>
assets/images/photo1.jpg
<br>
to
<br>
assets/images/photo25.jpg

</p>


<p>

Add song:
<br>
assets/music/birthday.mp3

</p>


</div>



<script src="config.js"></script>

<script src="assets/js/settings.js"></script>


</body>

</html>
